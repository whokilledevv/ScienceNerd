<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | ScienceNerd</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'nerd-bg': '#E6E2C5',      /* Parchment */
                        'nerd-dark': '#2B4593',    /* Marian Blue */
                        'nerd-primary': '#2B4593', 
                        'nerd-card': '#F4E9DE',    
                        'nerd-accent': '#055254',  
                        'nerd-text-light': '#E6E2C5',
                    },
                    fontFamily: {
                        sans: ['Merriweather', 'serif'],
                        heading: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass { background: rgba(230, 226, 197, 0.85); backdrop-filter: blur(12px); }
        
        /* تأثيرات التحول بين الـ Login والـ Register */
        .form-container { transition: all 0.5s ease-in-out; }
        .hidden-form { display: none; opacity: 0; transform: translateY(10px); }
        .active-form { display: block; opacity: 1; transform: translateY(0); animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input:focus { border-color: #2B4593; ring: 2px; ring-color: #2B4593/20; }
    </style>
</head>
<body class="bg-nerd-bg text-nerd-dark font-sans min-h-screen flex flex-col">

    <nav class="fixed w-full z-50 glass border-b border-nerd-dark/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-center items-center">
            <a href="Home.html" class="font-heading font-bold text-3xl">Science<span class="text-nerd-accent italic">Nerd</span></a>
        </div>
    </nav>

    <main class="grow pt-32 pb-20 flex items-center justify-center px-4">
        <div class="max-w-md w-full">
            
            <div class="bg-nerd-card rounded-[40px] border border-nerd-accent/20 p-10 shadow-2xl relative overflow-hidden">
                
                <div class="flex justify-center mb-10 gap-8 border-b border-nerd-dark/10 pb-4">
                    <button id="tab-login" class="font-heading text-xl font-bold border-b-2 border-nerd-dark pb-2 transition-all">Login</button>
                    <button id="tab-signup" class="font-heading text-xl font-bold text-nerd-dark/40 pb-2 hover:text-nerd-dark transition-all">Join Lab</button>
                </div>

                <div id="login-form" class="active-form">
                    <div class="text-center mb-8">
                        <h2 class="text-sm uppercase tracking-widest font-bold opacity-60">Welcome Back, Researcher</h2>
                    </div>
                    
                    <form class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-nerd-accent mb-2">Institutional Email</label>
                            <input type="email" placeholder="curie@science.edu" class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-3 focus:outline-none italic">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-nerd-accent">Security Key</label>
                                <a href="ForgotPass.html" class="text-[10px] italic hover:underline">Forgot?</a>
                            </div>
                            <input type="password" placeholder="••••••••" class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-3 focus:outline-none">
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="remember" class="accent-nerd-dark">
                            <label for="remember" class="text-xs italic">Remember this station</label>
                        </div>

                        <button type="button" onclick="window.location.href='NewExp.html'" class="w-full py-4 bg-nerd-dark text-white rounded-2xl font-heading font-bold text-lg shadow-xl hover:bg-nerd-accent transition-all flex items-center justify-center gap-2">
                            Access Laboratory
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </form>
                </div>

                <div id="signup-form" class="hidden-form">
                    <div class="text-center mb-8">
                        <h2 class="text-sm uppercase tracking-widest font-bold opacity-60">Initialize New Profile</h2>
                    </div>
                    
                    <form class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-widest text-nerd-accent mb-2">First Name</label>
                                <input type="text" class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-3 focus:outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-widest text-nerd-accent mb-2">Last Name</label>
                                <input type="text" class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-3 focus:outline-none text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-nerd-accent mb-2">Email</label>
                            <input type="email" class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-3 focus:outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-nerd-accent mb-2">Select Specialization</label>
                            <select class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-3 focus:outline-none text-sm italic">
                                <option>Physics Student</option>
                                <option>Chemistry Educator</option>
                                <option>Curious Nerd</option>
                            </select>
                        </div>

                        <button type="button" onclick="window.location.href='NewExp.html'" class="w-full py-4 bg-nerd-accent text-white rounded-2xl font-heading font-bold text-lg shadow-xl hover:bg-nerd-dark transition-all mt-4">
                            Create Account
                        </button>
                    </form>
                </div>

                <div class="mt-10 text-center">
                    <p class="text-[10px] uppercase tracking-widest opacity-40">ScienceNerd Secure Authentication System v2.0</p>
                </div>
            </div>
            
            <div class="mt-8 text-center flex justify-center gap-6 text-xs italic font-medium opacity-60">
                <a href="Home.html" class="hover:text-nerd-dark hover:underline">← Back to Home</a>
                <span>•</span>
                <a href="About.html" class="hover:text-nerd-dark hover:underline">Help & Documentation</a>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[10px] uppercase tracking-[0.2em] opacity-40">
        &copy; 2025 ScienceNerd Laboratory • All Rights Reserved
    </footer>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');

        tabLogin.addEventListener('click', () => {
            // UI Toggle
            tabLogin.classList.add('border-b-2', 'border-nerd-dark');
            tabLogin.classList.remove('text-nerd-dark/40');
            tabSignup.classList.remove('border-b-2', 'border-nerd-dark');
            tabSignup.classList.add('text-nerd-dark/40');
            
            // Form Toggle
            loginForm.classList.add('active-form');
            loginForm.classList.remove('hidden-form');
            signupForm.classList.add('hidden-form');
            signupForm.classList.remove('active-form');
        });

        tabSignup.addEventListener('click', () => {
            // UI Toggle
            tabSignup.classList.add('border-b-2', 'border-nerd-dark');
            tabSignup.classList.remove('text-nerd-dark/40');
            tabLogin.classList.remove('border-b-2', 'border-nerd-dark');
            tabLogin.classList.add('text-nerd-dark/40');

            // Form Toggle
            signupForm.classList.add('active-form');
            signupForm.classList.remove('hidden-form');
            loginForm.classList.add('hidden-form');
            loginForm.classList.remove('active-form');
        });
    </script>
</body>
</html>

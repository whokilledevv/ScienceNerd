<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Credentials | ScienceNerd</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'nerd-bg': '#E6E2C5',      /* Parchment */
                        'nerd-dark': '#2B4593',    /* Marian Blue */
                        'nerd-primary': '#2B4593', 
                        'nerd-card': '#F4E9DE',    
                        'nerd-accent': '#055254',  
                        'nerd-text-light': '#E6E2C5',
                    },
                    fontFamily: {
                        sans: ['Merriweather', 'serif'],
                        heading: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass { background: rgba(230, 226, 197, 0.85); backdrop-filter: blur(12px); }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-state { display: none; }
    </style>
</head>
<body class="bg-nerd-bg text-nerd-dark font-sans min-h-screen flex flex-col selection:bg-nerd-dark selection:text-white">

    <nav class="fixed w-full z-50 glass border-b border-nerd-dark/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-center items-center">
            <a href="Home.html" class="font-heading font-bold text-3xl">Science<span class="text-nerd-accent italic">Nerd</span></a>
        </div>
    </nav>

    <main class="grow pt-32 pb-20 flex items-center justify-center px-4">
        <div class="max-w-md w-full">
            
            <div class="bg-nerd-card rounded-[40px] border border-nerd-accent/20 p-10 shadow-2xl relative overflow-hidden">
                
                <div class="w-16 h-16 bg-nerd-dark/5 rounded-full flex items-center justify-center mx-auto mb-8">
                    <svg class="w-8 h-8 text-nerd-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>

                <div id="request-state" class="fade-in">
                    <div class="text-center mb-8">
                        <h1 class="font-heading text-3xl font-bold mb-3">Forgot Credentials?</h1>
                        <p class="text-sm italic opacity-70">Enter your researcher email to receive a secure recovery link.</p>
                    </div>
                    
                    <form id="forgot-form" class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-nerd-accent mb-3 text-center">Registered Email Address</label>
                            <input type="email" required placeholder="curie@science.edu" 
                                class="w-full bg-nerd-bg border border-nerd-dark/20 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-nerd-dark/10 italic text-center text-lg shadow-inner">
                        </div>
                        
                        <button type="submit" class="w-full py-4 bg-nerd-dark text-white rounded-2xl font-heading font-bold text-lg shadow-xl hover:bg-nerd-accent transition-all transform hover:-translate-y-1">
                            Send Recovery Link
                        </button>
                    </form>
                </div>

                <div id="success-state" class="hidden-state text-center py-4">
                    <div class="w-12 h-12 bg-nerd-accent text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <h2 class="font-heading text-2xl font-bold mb-4">Transmission Sent</h2>
                    <p class="text-sm italic leading-relaxed opacity-80 mb-8">
                        Check your inbox. We've dispatched a recovery key to your registered email address. It will expire in 15 minutes.
                    </p>
                    <button onclick="location.reload()" class="text-xs font-bold uppercase tracking-widest text-nerd-dark hover:underline">
                        Didn't receive it? Resend
                    </button>
                </div>

                <div class="mt-10 pt-8 border-t border-nerd-dark/5 text-center">
                    <a href="GetStarted.html" class="text-sm font-bold italic flex items-center justify-center gap-2 hover:text-nerd-accent transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Back to Login Portal
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[10px] uppercase tracking-[0.2em] opacity-40">
        &copy; 2025 ScienceNerd Laboratory Support
    </footer>

    <script>
        const forgotForm = document.getElementById('forgot-form');
        const requestState = document.getElementById('request-state');
        const successState = document.getElementById('success-state');

        forgotForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // إضافة أنيميشن "الإرسال" قبل التغيير
            forgotForm.querySelector('button').innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;

            // محاكاة إرسال البيانات
            setTimeout(() => {
                requestState.classList.add('hidden-state');
                successState.classList.remove('hidden-state');
                successState.classList.add('fade-in');
            }, 1500);
        });
    </script>
</body>
</html>

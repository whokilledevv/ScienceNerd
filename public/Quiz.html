<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScienceNerd | Interactive Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4e9de; color: #2B4593; }
        .quiz-card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .option-btn { border: 2px solid #2B4593; transition: 0.3s; }
        .option-btn:hover { background: #2B4593; color: white; }
        .correct { background: #4CAF50 !important; color: white !important; border-color: #4CAF50 !important; }
        .wrong { background: #F44336 !important; color: white !important; border-color: #F44336 !important; }
    </style>
</head>
<body class="p-5 md:p-10 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl text-center mb-10">
        <h1 class="text-4xl font-bold italic">ScienceNerd <span class="text-nerd-accent">Quiz Mode</span></h1>
        <p class="opacity-70 mt-2">Test your knowledge based on the lesson analysis</p>
    </div>

    <div id="quiz-container" class="w-full max-w-2xl quiz-card p-8">
        <div id="loading-quiz" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mx-auto mb-4"></div>
            <p>AI is generating your questions...</p>
        </div>
        
        <div id="question-area" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="q-count" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-bold">Question 1/5</span>
                <span id="score" class="font-bold">Score: 0</span>
            </div>
            <h2 id="q-text" class="text-xl font-bold mb-8">What is the capital of physics?</h2>
            <div id="options" class="grid grid-cols-1 gap-4">
                </div>
            <button id="next-btn" class="mt-8 w-full bg-blue-900 text-white py-3 rounded-xl font-bold hidden">Next Question</button>
        </div>

        <div id="result-area" class="hidden text-center py-10">
            <h2 class="text-3xl font-bold mb-4">Quiz Finished!</h2>
            <p id="final-score" class="text-5xl font-black text-blue-900 mb-6">0/5</p>
            <button onclick="location.reload()" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold">Retake Quiz</button>
        </div>
    </div>

    <script>
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

       async function generateQuiz() {
    const analysis = localStorage.getItem('lessonAnalysis');
    const loadingElem = document.getElementById('loading-quiz');
    const questionArea = document.getElementById('question-area');

    try {
        const response = await fetch('/generate-quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analysis })
        });
        const data = await response.json();
        
        if (data.success) {
            // تحويل النص اللي جاي من السيرفر لمصفوفة حقيقية
            currentQuestions = JSON.parse(data.quiz); 
            
            if (currentQuestions.length > 0) {
                showQuestion();
                loadingElem.classList.add('hidden');
                questionArea.classList.remove('hidden');
            } else {
                throw new Error("No questions found");
            }
        } else {
            alert("AI Error: " + data.error);
        }
    } catch (err) {
        console.error(err);
        loadingElem.innerHTML = `<p class="text-red-500">Failed to load quiz. Make sure your server is running.</p>`;
    }
}

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('q-count').innerText = `Question ${currentIndex + 1}/${currentQuestions.length}`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-4 rounded-xl text-left font-medium";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.answer);
                optionsDiv.appendChild(btn);
            });
            document.getElementById('next-btn').classList.add('hidden');
        }

        function checkAnswer(btn, selected, correct) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score').innerText = `Score: ${score}`;
            } else {
                btn.classList.add('wrong');
                // Show the correct one
                allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                document.getElementById('question-area').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${score}/${currentQuestions.length}`;
            }
        };

        window.onload = generateQuiz;
    </script>
</body>
</html>
